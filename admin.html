<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Painel Administrativo | Supra Cell</title>

  <!-- Tailwind CSS via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Cliente JavaScript do Supabase, usado para cadastrar/listar/excluir produtos -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-50 text-gray-800">

  <!-- =========================================
       HEADER
       Mesmo estilo da index.html
  ========================================== -->
  <header class="bg-white shadow-sm sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between gap-4">

      <a href="index.html" class="flex items-center gap-2 shrink-0">
        <span class="bg-slate-900 text-white font-bold text-lg rounded-lg w-9 h-9 flex items-center justify-center">
          S
        </span>
        <span class="font-bold text-xl text-gray-900 hidden sm:inline">Supra Cell</span>
      </a>

      <span class="text-sm font-medium text-gray-500">Painel Administrativo</span>

      <a href="index.html" class="text-sm font-medium text-gray-600 hover:text-slate-900 transition">
        &larr; Ver loja
      </a>

    </div>
  </header>

  <!-- =========================================
       CONTEÚDO DO PAINEL
  ========================================== -->
  <main class="max-w-3xl mx-auto px-4 py-10 sm:py-16">
    <h1 class="text-2xl sm:text-3xl font-bold text-gray-900 mb-1">
      Cadastrar Produto
    </h1>
    <p class="text-gray-500 mb-8">
      Os produtos cadastrados aqui aparecem automaticamente na vitrine da loja.
    </p>

    <!-- Formulário de cadastro -->
    <form id="form-cadastro-produto" class="bg-white rounded-2xl shadow-sm p-6 flex flex-col gap-4 mb-4">

      <div>
        <label for="produto-nome" class="block text-sm font-medium text-gray-700 mb-1">Nome do produto</label>
        <input
          type="text" id="produto-nome" name="produto-nome" required
          placeholder="Ex: Capinha Anti-impacto"
          class="w-full border border-gray-300 rounded-lg py-2 px-3 text-sm focus:outline-none focus:ring-2 focus:ring-slate-900 focus:border-transparent"
        />
      </div>

      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div>
          <label for="produto-categoria" class="block text-sm font-medium text-gray-700 mb-1">Categoria</label>
          <select
            id="produto-categoria" name="produto-categoria" required
            class="w-full border border-gray-300 rounded-lg py-2 px-3 text-sm focus:outline-none focus:ring-2 focus:ring-slate-900 focus:border-transparent bg-white"
          >
            <option value="Capinha">Capinha</option>
            <option value="Película">Película</option>
            <option value="Carregador">Carregador</option>
            <option value="Cabo">Cabo</option>
            <option value="Caixa de Som">Caixa de Som</option>
            <option value="Outro">Outro</option>
          </select>
        </div>

        <div>
          <label for="produto-preco" class="block text-sm font-medium text-gray-700 mb-1">Preço (R$)</label>
          <input
            type="number" id="produto-preco" name="produto-preco" required
            min="0" step="0.01" placeholder="39.90"
            class="w-full border border-gray-300 rounded-lg py-2 px-3 text-sm focus:outline-none focus:ring-2 focus:ring-slate-900 focus:border-transparent"
          />
        </div>
      </div>

      <div>
        <label for="produto-imagem" class="block text-sm font-medium text-gray-700 mb-1">URL da imagem</label>
        <input
          type="url" id="produto-imagem" name="produto-imagem" required
          placeholder="https://exemplo.com/foto-do-produto.jpg"
          class="w-full border border-gray-300 rounded-lg py-2 px-3 text-sm focus:outline-none focus:ring-2 focus:ring-slate-900 focus:border-transparent"
        />
      </div>

      <button
        type="submit"
        class="mt-2 w-full sm:w-auto self-start bg-slate-900 hover:bg-slate-800 text-white font-semibold px-6 py-2.5 rounded-lg transition"
      >
        Cadastrar Produto
      </button>

      <p id="admin-feedback"></p>
    </form>

    <!-- Lista de produtos já cadastrados -->
    <h2 class="text-xl font-bold text-gray-900 mt-10 mb-4">Produtos Cadastrados</h2>
    <div id="admin-produtos-lista" class="flex flex-col gap-3">
      <p class="text-sm text-gray-500">Carregando produtos...</p>
    </div>
  </main>

  <!-- =========================================
       FOOTER
       Mesmo estilo da index.html
  ========================================== -->
  <footer class="bg-slate-900 text-slate-300 mt-10">
    <div class="max-w-7xl mx-auto px-4 py-8 text-center text-sm">
      &copy; 2026 Supra Cell. Painel de uso interno.
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
