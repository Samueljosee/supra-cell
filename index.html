<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Supra Cell | Loja Online de Acessórios para Celular</title>

  <!-- Tailwind CSS via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Cliente JavaScript do Supabase, usado para buscar os produtos no banco -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-50 text-gray-800">

  <!-- =========================================
       HEADER
       Logo da loja, barra de busca e ícone do carrinho
  ========================================== -->
  <header class="bg-white shadow-sm sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between gap-4">

      <!-- Logotipo -->
      <a href="#" class="flex items-center gap-2 shrink-0">
        <span class="bg-slate-900 text-white font-bold text-lg rounded-lg w-9 h-9 flex items-center justify-center">
          S
        </span>
        <span class="font-bold text-xl text-gray-900 hidden sm:inline">Supra Cell</span>
      </a>

      <!-- Barra de busca (apenas visual, sem funcionalidade de busca) -->
      <div class="flex-1 max-w-xl">
        <div class="relative">
          <input
            type="text"
            placeholder="Buscar capinhas, películas, carregadores..."
            class="w-full border border-gray-300 rounded-full py-2 pl-4 pr-10 text-sm focus:outline-none focus:ring-2 focus:ring-[#a31a1a] focus:border-transparent"
          />
          <button class="absolute right-1 top-1/2 -translate-y-1/2 bg-[#a31a1a] hover:bg-[#7a0c0c] text-white rounded-full w-8 h-8 flex items-center justify-center transition-all duration-300">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35M17 10a7 7 0 11-14 0 7 7 0 0114 0z" />
            </svg>
          </button>
        </div>
      </div>

      <!-- Ícone do carrinho de compras -->
      <a href="carrinho.html" class="relative shrink-0 p-2 rounded-full hover:bg-gray-100 transition">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-gray-700" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
          <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 3h1.386c.51 0 .955.343 1.087.836l.383 1.437M7.5 14.25a3 3 0 00-3 3h15.75m-12.75-3h11.218c1.121-2.3 1.994-4.693 2.608-7.163.145-.585-.323-1.087-.926-1.087H5.106M7.5 14.25L5.106 5.272M7.5 14.25L4.5 17.25M7.5 14.25L18.75 14.25M6.75 20.25a.75.75 0 11-1.5 0 .75.75 0 011.5 0zM17.25 20.25a.75.75 0 11-1.5 0 .75.75 0 011.5 0z" />
        </svg>
        <span id="cart-count" class="absolute -top-1 -right-1 bg-slate-900 text-white text-xs font-bold rounded-full w-5 h-5 flex items-center justify-center">0</span>
      </a>

    </div>

    <!-- Barra de categorias: navegação disponível em qualquer página.
         Preenchida dinamicamente pelo script.js a partir da tabela
         "categorias" no Supabase (gerenciada pelo cadastrador.py). -->
    <nav class="border-t border-gray-100">
      <ul
        id="categorias-nav"
        data-base-href=""
        class="max-w-7xl mx-auto px-4 flex items-center gap-8 overflow-x-auto py-3.5 text-sm font-medium tracking-wide text-gray-600"
      ></ul>
    </nav>
  </header>

  <!-- =========================================
       BANNER PRINCIPAL
       Chamada de promoção em destaque
  ========================================== -->
  <section class="bg-gradient-to-r from-[#7a0c0c] via-[#a31a1a] to-[#d9531e] text-white">
    <div class="max-w-7xl mx-auto px-4 py-16 sm:py-24 flex flex-col items-center text-center gap-4">
      <h1 class="text-4xl sm:text-6xl font-extrabold leading-tight tracking-tight">
        Carregadores Turbo e Capinhas Premium
      </h1>
      <p class="text-white text-base sm:text-lg max-w-xl">
        <span class="font-bold text-[#FFD700]">Frete Grátis</span> para
        <span class="font-bold text-[#FFD700]">Crato</span>,
        <span class="font-bold text-[#FFD700]">Ponta da Serra</span> e toda região.
      </p>
      <a
        href="#produtos"
        class="mt-2 bg-[#fff3e3] text-[#7a0c0c] font-semibold px-6 py-3 rounded-full shadow-md transition-all duration-300 hover:bg-white hover:shadow-xl hover:scale-105"
      >
        Ver Ofertas
      </a>
    </div>
  </section>

  <!-- =========================================
       NAVEGUE POR CATEGORIAS
       Cards gerados dinamicamente pelo script.js a partir da tabela
       "categorias" no Supabase (gerenciada pelo cadastrador.py)
  ========================================== -->
  <section class="max-w-7xl mx-auto px-4 py-14 sm:py-20">
    <h2 class="text-2xl sm:text-3xl font-bold text-[#a31a1a] mb-8 text-center sm:text-left">
      Navegue por Categorias
    </h2>

    <div id="categorias-grid" class="grid grid-cols-3 sm:grid-cols-4 lg:grid-cols-7 gap-4 sm:gap-6"></div>
  </section>

  <!-- =========================================
       VITRINE DE PRODUTOS
       Os cards são gerados dinamicamente pelo script.js,
       com os dados vindos da tabela "produtos" no Supabase
  ========================================== -->
  <main id="produtos" class="max-w-7xl mx-auto px-4 py-14 sm:py-20">
    <h2 class="text-2xl sm:text-3xl font-bold text-gray-900 mb-8 text-center sm:text-left">
      Mais Vendidos
    </h2>

    <div id="produtos-grid" class="grid grid-cols-2 lg:grid-cols-4 gap-4 sm:gap-6">
      <p class="col-span-2 lg:col-span-4 text-center text-gray-500 py-10">Carregando produtos...</p>
    </div>
  </main>

  <!-- =========================================
       FOOTER
       Direitos autorais e redes sociais
  ========================================== -->
  <footer class="bg-black text-slate-300 mt-10">
    <div class="max-w-7xl mx-auto px-4 py-8 flex flex-col sm:flex-row items-center justify-between gap-4">

      <p class="text-sm text-center sm:text-left">
        &copy; 2026 Supra Cell. Todos os direitos reservados.
      </p>

      <!-- Ícones de redes sociais: links preenchidos dinamicamente pelo
           script.js, buscados da tabela "configuracoes" no Supabase
           (gerenciados pela aba "Configurações" do cadastrador.py) -->
      <div class="flex items-center gap-4">
        <a id="link-instagram-footer" href="#" target="_blank" rel="noopener" aria-label="Instagram" class="hover:text-white transition">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
            <rect x="3" y="3" width="18" height="18" rx="5" />
            <circle cx="12" cy="12" r="4" />
            <circle cx="17.5" cy="6.5" r="0.8" fill="currentColor" stroke="none" />
          </svg>
        </a>
        <a id="link-facebook-footer" href="#" target="_blank" rel="noopener" aria-label="Facebook" class="hover:text-white transition">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
            <path stroke-linecap="round" stroke-linejoin="round" d="M14 9h3V6h-3a4 4 0 00-4 4v2H7v3h3v6h3v-6h3l1-3h-4v-2a1 1 0 011-1z" />
          </svg>
        </a>
        <a id="link-chat-footer" href="#" target="_blank" rel="noopener" aria-label="Chat / Contato" class="hover:text-white transition">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
            <path stroke-linecap="round" stroke-linejoin="round" d="M21 12c0 4.556-4.03 8.25-9 8.25a9.76 9.76 0 01-2.555-.337A5.972 5.972 0 015.41 20.97a5.969 5.969 0 01-.474-.065 4.48 4.48 0 00.978-2.025c.09-.457-.133-.901-.467-1.226C3.93 16.178 3 14.189 3 12c0-4.556 4.03-8.25 9-8.25s9 3.694 9 8.25z" />
          </svg>
        </a>
      </div>

    </div>
  </footer>

  <!-- =========================================
       MODAL DE DETALHES DO PRODUTO
       Galeria estilo Mercado Livre: foto grande + miniaturas embaixo.
       Aberto via JS ao clicar num card da vitrine (renderizarProdutos).
  ========================================== -->
  <div
    id="modal-produto"
    class="hidden fixed inset-0 bg-black/60 z-[60] flex items-center justify-center p-4"
  >
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-lg p-6 relative max-h-[90vh] overflow-y-auto">
      <button
        id="fechar-modal-produto"
        type="button"
        class="absolute top-4 right-4 text-gray-400 hover:text-gray-600 transition"
        aria-label="Fechar"
      >
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>

      <!-- Foto principal -->
      <div class="rounded-xl bg-gray-50 flex items-center justify-center overflow-hidden">
        <img id="modal-imagem-principal" src="" alt="" class="max-h-[400px] w-full object-contain" />
      </div>

      <!-- Tira de miniaturas -->
      <div id="modal-miniaturas" class="flex items-center gap-2 mt-3 overflow-x-auto pb-1"></div>

      <h3 id="modal-produto-nome" class="mt-4 font-semibold text-lg text-gray-900"></h3>
      <p id="modal-produto-preco" class="text-[#a31a1a] font-bold text-2xl mt-1"></p>

      <button
        id="modal-botao-adicionar"
        class="mt-4 w-full bg-[#a31a1a] hover:bg-[#7a0c0c] text-white font-medium py-2.5 rounded-lg transition-all duration-300"
      >
        Adicionar ao Carrinho
      </button>
    </div>
  </div>

  <!-- =========================================
       BOTÃO FLUTUANTE DO WHATSAPP
       O número é preenchido dinamicamente pelo script.js,
       buscado da tabela "configuracoes" no Supabase
  ========================================== -->
  <a
    id="botao-whatsapp-flutuante"
    href="#"
    target="_blank"
    rel="noopener"
    aria-label="Falar no WhatsApp"
    class="fixed bottom-6 right-6 z-50 w-14 h-14 rounded-full bg-[#25D366] hover:bg-[#20BD5A] text-white flex items-center justify-center shadow-lg transition-all duration-300 hover:scale-110"
  >
    <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7" viewBox="0 0 24 24" fill="currentColor">
      <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z" />
      <path d="M12.001 2C6.478 2 2 6.477 2 12c0 1.986.581 3.834 1.582 5.392L2 22l4.735-1.55A9.953 9.953 0 0012.001 22C17.524 22 22 17.523 22 12S17.524 2 12.001 2zm0 18.181a8.14 8.14 0 01-4.146-1.135l-.297-.176-3.09.998.99-3.07-.19-.31A8.15 8.15 0 013.82 12c0-4.516 3.665-8.181 8.18-8.181 4.516 0 8.181 3.665 8.181 8.181 0 4.516-3.665 8.181-8.18 8.181z" />
    </svg>
  </a>

  <script src="script.js"></script>
</body>
</html>
